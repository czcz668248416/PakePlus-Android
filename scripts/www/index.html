<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>文学少女维希莱妮 · 全功能版</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --bg-input: #0d1117;
            --border-color: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --accent-light: rgba(88, 166, 255, 0.15);
            --danger: #f85149;
            --success: #3fb950;
            --warning: #d29922;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            --transition: 0.2s ease;
            --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-brand { font-size: 1rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
        .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

        .mode-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 3px;
        }
        .mode-tab {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }
        .mode-tab:hover { color: var(--text-primary); background: var(--bg-primary); }
        .mode-tab.active { background: var(--accent); color: #fff; }

        .main-container { flex: 1; max-width: 100%; margin: 0 auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow); }
        .card.collapsed .card-body { display: none; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; cursor: pointer; user-select: none; }
        .card-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
        .collapse-btn { font-size: 1.1rem; color: var(--text-muted); transition: transform 0.2s ease; }
        .card:not(.collapsed) .collapse-btn { transform: rotate(90deg); }

        .form-group { margin-bottom: 10px; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
        .form-input, .form-textarea, .form-select {
            width: 100%; padding: 10px 12px; background: var(--bg-input); border: 1px solid var(--border-color);
            border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.85rem; transition: var(--transition); resize: vertical;
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-light); }
        .form-textarea { min-height: 100px; font-family: var(--font-mono); font-size: 0.8rem; }
        .form-textarea.tall { min-height: 150px; }

        .btn {
            padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); font-size: 0.8rem;
            font-weight: 500; cursor: pointer; transition: var(--transition); white-space: nowrap; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); }
        .btn-secondary:hover { background: var(--border-color); }
        .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: rgba(248, 81, 73, 0.15); }
        .btn-success { background: var(--success); color: #fff; border-color: var(--success); }
        .btn-sm { padding: 4px 8px; font-size: 0.7rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .api-link { color: var(--accent); text-decoration: underline; font-size: 0.75rem; margin-left: 6px; }

        .content-box {
            background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px;
            max-height: 300px; overflow-y: auto; font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; margin-top: 8px;
        }
        .content-toolbar-external { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .token-info { font-size: 0.65rem; color: var(--text-muted); font-family: var(--font-mono); }

        .chapter-item { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; margin-bottom: 12px; }
        .chapter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 6px; flex-wrap: wrap; }
        .chapter-number { font-weight: 700; color: var(--accent); font-size: 0.85rem; }
        .chapter-actions { display: flex; gap: 4px; flex-wrap: wrap; }

        .character-card { background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; cursor: pointer; transition: var(--transition); }
        .character-card:hover { border-color: var(--accent); }
        .character-card.selected { border-color: var(--accent); background: var(--accent-light); }
        .character-checkbox { accent-color: var(--accent); margin-right: 4px; }
        .character-name { font-weight: 600; font-size: 0.85rem; flex: 1; }
        .chat-area { background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 12px; max-height: 300px; overflow-y: auto; margin-top: 8px; }
        .chat-msg { margin-bottom: 8px; line-height: 1.6; }
        .chat-speaker { font-weight: 700; color: var(--accent); }
        .chat-input-row { display: flex; gap: 6px; margin-top: 8px; }
        .chat-input-row .form-input { flex: 1; }

        .preview-section { background: #ffffff; border: 1px solid #d0d7de; border-radius: var(--radius-lg); padding: 24px; color: #1f2328; font-size: 0.9rem; line-height: 1.7; max-height: 400px; overflow-y: auto; }
        .preview-label { font-size: 0.7rem; color: #656d76; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; border-bottom: 1px solid #d0d7de; padding-bottom: 6px; }

        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; max-width: 90%; width: 400px; }

        .chat-fullscreen {
            position: fixed; top:0; left:0; right:0; bottom:0; background: var(--bg-primary); z-index: 200;
            display: flex; flex-direction: column;
        }
        .chat-fullscreen-header { background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); padding: 12px 16px; display: flex; align-items: center; gap: 12px; height: 56px; flex-shrink: 0; }
        .chat-fullscreen-header .back-btn { background: transparent; border: none; color: var(--accent); font-size: 1.2rem; cursor: pointer; }
        .chat-fullscreen-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .chat-fullscreen-footer { background: var(--bg-secondary); border-top: 1px solid var(--border-color); padding: 10px 16px; display: flex; gap: 8px; align-items: center; flex-shrink: 0; transition: transform 0.1s ease; }
        .chat-fullscreen-footer .form-input { flex: 1; border-radius: 20px; padding: 10px 16px; }
        .chat-fullscreen-footer .send-btn { background: var(--accent); color: #fff; border: none; border-radius: 20px; padding: 10px 20px; cursor: pointer; }

        .doc-list-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border-color); font-size: 0.75rem; }
        .footer-note { text-align: center; padding: 20px 16px; font-size: 0.7rem; color: var(--text-muted); }
        ::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body>
<header class="header">
    <span class="header-brand">📖 文学少女维希莱妮 · 稳定版</span>
    <div class="header-actions">
        <div class="mode-tabs" id="modeTabs">
            <button class="mode-tab active" data-mode="longtext">📝 长文本</button>
            <button class="mode-tab" data-mode="novel">📖 小说</button>
            <button class="mode-tab" data-mode="chat">💬 对话</button>
        </div>
        <button class="btn btn-secondary btn-sm" id="saveProfileBtn">💾 保存方案</button>
        <button class="btn btn-secondary btn-sm" id="loadProfileBtn">📂 加载方案</button>
    </div>
</header>
<div class="main-container" id="mainContainer"></div>
<div class="footer-note">内容由AI生成，请仔细甄别 | 支持DeepSeek API</div>
<div id="modalContainer"></div>
<div id="chatFullscreenContainer"></div>

<script>
    (function(){
        // ---------- 状态 ----------
        const STORAGE_KEY = 'literary_girl_v2';
        const PROFILES_KEY = 'literary_profiles_v2';
        let state = {
            currentMode: 'longtext',
            apiKey: '',
            currentModel: 'deepseek-v4-pro',
            maxTokens: 256000,
            systemPromptLongtext: '',
            systemPromptNovel: '',
            systemPromptChat: '',
            longtextUserPrompt: '',
            longtextResult: '',
            novelTitle: '未命名小说',
            novelChapters: [],
            chatCharacters: [],
            chatSelectedIndices: [],
            chatHistory: [],
            chatContextCount: 6,
            chatUserInput: '',
            importedDocs: [],
            collapsedCards: { api: false, mode: false, preview: false },
            chatFullscreen: false
        };

        // 辅助函数
        function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        function loadStoredState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if(raw) {
                try {
                    const saved = JSON.parse(raw);
                    Object.assign(state, saved);
                    if(!state.novelChapters) state.novelChapters = [];
                    if(!state.chatCharacters) state.chatCharacters = [];
                    if(!state.chatHistory) state.chatHistory = [];
                    if(!state.importedDocs) state.importedDocs = [];
                    if(!state.chatSelectedIndices) state.chatSelectedIndices = [];
                    state.novelChapters.forEach(ch => { if(!ch.content) ch.content=''; if(!ch.summary) ch.summary=''; });
                    state.chatHistory.forEach(m => { if(m.role === 'user') m.speaker = '我'; });
                } catch(e) {}
            }
            if(state.novelChapters.length === 0) state.novelChapters = [{summary:'开篇', content:''},{summary:'发展', content:''},{summary:'高潮', content:''}];
        }
        function estimateTokens(text) { if(!text) return 0; const cjk = (text.match(/[\u4e00-\u9fff]/g)||[]).length*2; const words = text.replace(/[\u4e00-\u9fff]/g,' ').trim().split(/\s+/).filter(w=>w).length; return cjk + Math.round(words*1.3); }
        function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function formatText(t) { return escapeHtml(t).replace(/\n/g,'<br>'); }
        function copyText(t) { if(!t) return; navigator.clipboard?.writeText(t).then(()=>alert('已复制')).catch(()=>alert('复制失败')); }
        function scrollToBottom(el) { if(el) setTimeout(()=> el.scrollTop = el.scrollHeight, 30); }

        // 获取当前系统提示
        function getCurSysPrompt() {
            if(state.currentMode === 'longtext') return state.systemPromptLongtext;
            if(state.currentMode === 'novel') return state.systemPromptNovel;
            return state.systemPromptChat;
        }
        function setCurSysPrompt(v) {
            if(state.currentMode === 'longtext') state.systemPromptLongtext = v;
            else if(state.currentMode === 'novel') state.systemPromptNovel = v;
            else state.systemPromptChat = v;
        }

        // ---------- API调用 (统一) ----------
        async function callAPI(messages, { stream = false } = {}) {
            if(!state.apiKey) throw new Error('请填写API Key');
            // 附加语料
            if(state.importedDocs.length) {
                const docText = state.importedDocs.map(d=>d.content).join('\n\n').slice(0, 30000);
                messages = messages.map(m => {
                    if(m.role === 'system') return { ...m, content: `${m.content}\n\n【参考语料】\n${docText}` };
                    return m;
                });
            }
            const isAnthropic = state.currentModel === 'claude-code';
            const url = isAnthropic ? 'https://api.deepseek.com/anthropic/v1/messages' : 'https://api.deepseek.com/v1/chat/completions';
            const headers = isAnthropic ? { 'Content-Type':'application/json', 'x-api-key': state.apiKey } : { 'Content-Type':'application/json', 'Authorization': `Bearer ${state.apiKey}` };
            let body;
            if(isAnthropic) {
                const sysMsg = messages.find(m=>m.role==='system');
                const userMsgs = messages.filter(m=>m.role!=='system').map(m=>({ role: m.role, content: [{type:'text', text:m.content}] }));
                body = { model: 'deepseek-v4-pro', max_tokens: state.maxTokens, stream, messages: userMsgs };
                if(sysMsg) body.system = sysMsg.content;
            } else {
                const modelId = state.currentModel === 'deepseek-v4-flash' ? 'deepseek-v4-flash' : 'deepseek-v4-pro';
                body = { model: modelId, messages, max_tokens: state.maxTokens, stream, temperature: 0.8 };
            }
            const resp = await fetch(url, { method:'POST', headers, body: JSON.stringify(body) });
            if(!resp.ok) throw new Error(`API错误 ${resp.status}`);
            return resp;
        }

        async function readStream(resp, isAnthropic, onChunk) {
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while(true) {
                const { done, value } = await reader.read();
                if(done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for(let line of lines) {
                    const trimmed = line.trim();
                    if(!trimmed || trimmed === 'data: [DONE]') continue;
                    if(trimmed.startsWith('data: ')) {
                        try {
                            const json = JSON.parse(trimmed.slice(6));
                            let text = '';
                            if(isAnthropic) { if(json.type === 'content_block_delta' && json.delta?.text) text = json.delta.text; }
                            else { if(json.choices?.[0]?.delta?.content) text = json.choices[0].delta.content; }
                            if(text) onChunk(text);
                        } catch(e) {}
                    }
                }
            }
        }

        // ---------- 长文本生成 ----------
        async function generateLongtext() {
            if(!state.apiKey) return alert('请填写API Key');
            const btn = document.getElementById('genLongBtn');
            if(btn) btn.disabled = true;
            state.longtextResult = '';
            saveState();
            updateLongtextUI();
            try {
                const messages = [];
                if(state.systemPromptLongtext) messages.push({ role:'system', content: state.systemPromptLongtext });
                messages.push({ role:'user', content: state.longtextUserPrompt || '请生成一篇长文本' });
                const resp = await callAPI(messages, { stream: true });
                let full = '';
                await readStream(resp, state.currentModel === 'claude-code', chunk => {
                    full += chunk;
                    state.longtextResult = full;
                    updateLongtextUI();
                    const box = document.getElementById('longtextContentBox');
                    if(box) scrollToBottom(box);
                });
                if(!full) throw new Error('无内容');
                saveState();
            } catch(e) {
                state.longtextResult = `❌ 生成失败: ${e.message}`;
                updateLongtextUI();
                alert(e.message);
            } finally { if(btn) btn.disabled = false; saveState(); updatePreview(); }
        }
        function updateLongtextUI() {
            const div = document.getElementById('longtextDisplay');
            if(div) div.innerHTML = state.longtextResult ? formatText(state.longtextResult) : '<span style="color:var(--text-muted)">等待生成...</span>';
            const info = document.getElementById('longtextTokenInfo');
            if(info) info.innerText = `字数:${state.longtextResult.length} Token:${estimateTokens(state.longtextResult)}`;
        }

        // ---------- 小说模式核心 ----------
        async function generateSingleChapter(idx, force = true) {
            if(!state.apiKey) { alert('请填写API Key'); return false; }
            const ch = state.novelChapters[idx];
            if(!ch) return false;
            if(force) ch.content = '';
            saveState();
            updateChapterUI(idx);
            // 构建上下文
            let sys = state.systemPromptNovel || `你是一位杰出的小说家，文笔流畅，保持风格一致。根据前文续写章节。`;
            let context = `小说标题：《${state.novelTitle}》\n`;
            for(let i=0; i<=idx; i++) context += `第${i+1}章梗概：${state.novelChapters[i]?.summary || '无'}\n`;
            context += `\n`;
            let prevContent = state.novelChapters.slice(0, idx).filter(c=>c.content && !c.content.startsWith('❌')).map((c,i)=>`第${i+1}章摘要：${c.content.substring(0,1500)}...`).join('\n');
            if(prevContent) context += `【前文回顾】\n${prevContent}\n\n`;
            const userMsg = `请根据以上设定，写出第${idx+1}章的完整内容。保持叙事连贯。`;
            const messages = [{ role:'system', content: sys }, { role:'user', content: context + userMsg }];
            try {
                const resp = await callAPI(messages, { stream: true });
                let full = '';
                await readStream(resp, state.currentModel === 'claude-code', chunk => {
                    full += chunk;
                    ch.content = full;
                    saveState();
                    updateChapterUI(idx);
                    const box = document.getElementById(`chapterBox${idx}`);
                    if(box) scrollToBottom(box);
                });
                if(!full.trim()) throw new Error('生成失败');
                alert(`第${idx+1}章完成`);
                return true;
            } catch(e) {
                ch.content = `❌ 错误: ${e.message}`;
                saveState();
                updateChapterUI(idx);
                alert(`第${idx+1}章失败: ${e.message}`);
                return false;
            }
        }
        function updateChapterUI(idx) {
            const contentDiv = document.getElementById(`chapterContent${idx}`);
            const ch = state.novelChapters[idx];
            if(contentDiv) contentDiv.innerHTML = ch.content ? formatText(ch.content) : '<span style="color:var(--text-muted)">未生成</span>';
            const tokenSpan = document.getElementById(`chapterToken${idx}`);
            if(tokenSpan) tokenSpan.innerText = `字数:${ch.content.length} Token:${estimateTokens(ch.content)}`;
        }
        async function generateAllChapters() {
            for(let i=0; i<state.novelChapters.length; i++) {
                const ok = await generateSingleChapter(i, true);
                if(!ok) break;
            }
            alert('批量生成结束');
        }
        function addChapter() { state.novelChapters.push({ summary:'新章节', content:'' }); saveState(); render(); }
        function deleteChapter(idx) { state.novelChapters.splice(idx,1); saveState(); render(); }
        function clearChapter(idx) { state.novelChapters[idx].content = ''; saveState(); render(); }
        function copyChapter(idx) { copyText(state.novelChapters[idx].content); }
        function clearAllChapters() { state.novelChapters.forEach(ch=>ch.content=''); saveState(); render(); }
        function concatAndCopy() {
            let full = `《${state.novelTitle}》\n\n` + state.novelChapters.map((ch,i)=>`第${i+1}章\n${ch.content}`).join('\n\n');
            copyText(full);
        }

        // ---------- 对话模式 ----------
        async function sendChatMessage(text, isFullscreen=false) {
            if(state.chatSelectedIndices.length === 0) return alert('请至少选择一个角色');
            state.chatHistory.push({ speaker:'我', text, role:'user' });
            saveState();
            renderChatHistoryUI();
            // 准备上下文
            let recent = state.chatHistory.slice(-state.chatContextCount*2);
            let baseSys = state.systemPromptChat || `你扮演角色，严格遵循角色设定，不打破人设。`;
            let promises = state.chatSelectedIndices.map(async idx => {
                let char = state.chatCharacters[idx];
                if(!char) return null;
                let messages = [{ role:'system', content: `你正在扮演${char.name}。${char.description || ''}\n${baseSys}` }];
                recent.forEach(m => messages.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));
                try {
                    let resp = await callAPI(messages, { stream: false });
                    let data = await resp.json();
                    let reply = (state.currentModel === 'claude-code') ? data.content?.[0]?.text : data.choices?.[0]?.message?.content;
                    return { speaker: char.name, text: reply || '...', role:'assistant' };
                } catch(e) { return { speaker: char.name, text: `❌ ${e.message}`, role:'assistant' }; }
            });
            let results = await Promise.all(promises);
            results.forEach(r => { if(r) state.chatHistory.push(r); });
            saveState();
            renderChatHistoryUI();
            if(isFullscreen) {
                renderFullscreenChat();
                const body = document.getElementById('fullscreenChatBody');
                if(body) scrollToBottom(body);
            } else {
                const box = document.getElementById('chatHistoryArea');
                if(box) scrollToBottom(box);
            }
        }
        function renderChatHistoryUI() {
            const container = document.getElementById('chatHistoryArea');
            if(!container) return;
            let html = state.chatHistory.map(m => `<div class="chat-msg"><span class="chat-speaker">${escapeHtml(m.speaker)}：</span>${formatText(m.text)}</div>`).join('');
            container.innerHTML = html || '<span style="color:var(--text-muted)">暂无对话</span>';
            const tokenSpan = document.getElementById('chatTokenInfo');
            if(tokenSpan) tokenSpan.innerText = `字数:${state.chatHistory.reduce((s,m)=>s+m.text.length,0)} Token:${estimateTokens(state.chatHistory.map(m=>m.text).join(' '))}`;
        }
        function clearChatHistory() { state.chatHistory = []; saveState(); render(); }
        function copyChatHistory() { copyText(state.chatHistory.map(m=>`${m.speaker}：${m.text}`).join('\n')); }

        // 全屏聊天 + 键盘适配
        function renderFullscreenChat() {
            let selected = state.chatSelectedIndices.map(i=>state.chatCharacters[i]?.name).join(',')||'角色';
            let messagesHtml = state.chatHistory.map(m => `<div style="text-align:${m.role==='user'?'right':'left'}; margin-bottom:12px;"><strong style="color:${m.role==='user'?'#8b949e':'#58a6ff'}">${escapeHtml(m.speaker)}</strong><div style="background:${m.role==='user'?'#21262d':'rgba(88,166,255,0.15)'}; display:inline-block; padding:8px 12px; border-radius:16px; max-width:80%; margin-top:4px;">${formatText(m.text)}</div></div>`).join('');
            const container = document.getElementById('chatFullscreenContainer');
            container.innerHTML = `<div class="chat-fullscreen">
                <div class="chat-fullscreen-header"><button class="back-btn" id="closeFullscreenBtn">←</button><span>💬 ${escapeHtml(selected)}</span></div>
                <div class="chat-fullscreen-body" id="fullscreenChatBody">${messagesHtml || '<div style="text-align:center;margin-top:40%;">开始聊天</div>'}</div>
                <div class="chat-fullscreen-footer" id="fullscreenFooter"><input type="text" class="form-input" id="fullscreenInput" placeholder="输入消息..."><button class="send-btn" id="fullscreenSendBtn">发送</button></div>
            </div>`;
            document.getElementById('closeFullscreenBtn').onclick = () => { state.chatFullscreen = false; render(); };
            const sendBtn = document.getElementById('fullscreenSendBtn');
            const inputEl = document.getElementById('fullscreenInput');
            const adjustFooter = () => {
                const footer = document.getElementById('fullscreenFooter');
                const vp = window.visualViewport;
                if(footer && vp) {
                    const keyboardH = window.innerHeight - vp.height;
                    if(keyboardH > 100) footer.style.transform = `translateY(-${keyboardH}px)`;
                    else footer.style.transform = '';
                }
            };
            window.visualViewport?.addEventListener('resize', adjustFooter);
            window.visualViewport?.addEventListener('scroll', adjustFooter);
            sendBtn.onclick = async () => {
                let txt = inputEl.value.trim();
                if(!txt) return;
                inputEl.value = '';
                await sendChatMessage(txt, true);
                renderFullscreenChat();
                const newBody = document.getElementById('fullscreenChatBody');
                if(newBody) scrollToBottom(newBody);
                document.getElementById('fullscreenInput')?.focus();
            };
            inputEl.onkeydown = (e) => { if(e.key === 'Enter') sendBtn.click(); };
            setTimeout(()=> { inputEl.focus(); scrollToBottom(document.getElementById('fullscreenChatBody')); }, 50);
        }

        // 角色管理
        function openCharEditor(idx) {
            let isNew = idx === -1;
            let char = isNew ? { name:'', description:'' } : state.chatCharacters[idx];
            let modal = document.createElement('div'); modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal"><h3>${isNew?'新建角色':'编辑角色'}</h3><div class="form-group"><input id="charName" class="form-input" placeholder="名称" value="${escapeHtml(char.name)}"></div><div class="form-group"><textarea id="charDesc" class="form-textarea" rows="3" placeholder="身份、性格、用语习惯等">${escapeHtml(char.description)}</textarea></div><div style="display:flex; gap:8px; justify-content:flex-end;"><button class="btn btn-secondary" id="cancelChar">取消</button><button class="btn btn-primary" id="saveChar">保存</button></div></div>`;
            document.body.appendChild(modal);
            document.getElementById('saveChar').onclick = () => {
                let name = document.getElementById('charName').value.trim();
                if(!name) return alert('请输入名称');
                let desc = document.getElementById('charDesc').value;
                if(isNew) {
                    if(state.chatCharacters.length >= 5) return alert('最多5个角色');
                    state.chatCharacters.push({ name, description: desc });
                } else {
                    state.chatCharacters[idx] = { name, description: desc };
                }
                saveState();
                modal.remove();
                render();
            };
            document.getElementById('cancelChar').onclick = () => modal.remove();
        }

        // ---------- 渲染主界面 ----------
        function render() {
            if(state.currentMode === 'chat' && state.chatFullscreen) {
                document.getElementById('mainContainer').innerHTML = '';
                document.getElementById('chatFullscreenContainer').style.display = 'block';
                renderFullscreenChat();
                return;
            }
            document.getElementById('chatFullscreenContainer').style.display = 'none';
            const container = document.getElementById('mainContainer');
            container.innerHTML = renderSettingsCard() + renderModeCard() + (state.currentMode !== 'chat' ? renderPreviewCard() : '');
            attachGlobalEvents();
            document.querySelectorAll('.mode-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.mode === state.currentMode));
            applyCollapse();
            if(state.currentMode === 'novel') attachNovelEvents();
            if(state.currentMode === 'chat') attachChatEvents();
            if(state.currentMode === 'longtext') attachLongtextEvents();
            updatePreview();
        }

        function renderSettingsCard() {
            let docsHtml = state.importedDocs.map((d,i)=>`<div class="doc-list-item"><span>📄 ${escapeHtml(d.name)} (${d.content.length}字)</span><button class="btn btn-sm btn-danger" onclick="window.removeDoc(${i})">✕</button></div>`).join('');
            return `<div class="card" id="apiCard"><div class="card-header" id="apiHeader"><span class="card-title">⚙️ API设置 & 语料</span><span class="collapse-btn">▶</span></div><div class="card-body"><div class="form-group"><label class="form-label">DeepSeek API Key</label><input type="password" class="form-input" id="apiKeyInput" value="${escapeHtml(state.apiKey)}"></div><div class="form-group"><label class="form-label">模型</label><select id="modelSelect" class="form-select"><option ${state.currentModel==='deepseek-v4-pro'?'selected':''}>deepseek-v4-pro</option><option ${state.currentModel==='deepseek-v4-flash'?'selected':''}>deepseek-v4-flash</option><option ${state.currentModel==='claude-code'?'selected':''}>claude-code</option></select></div><div class="form-group"><label class="form-label">最大Token</label><input type="number" id="maxTokensInput" class="form-input" value="${state.maxTokens}"></div><div class="form-group"><label class="form-label">系统提示 (${state.currentMode==='longtext'?'长文本':state.currentMode==='novel'?'小说':'对话'})</label><textarea id="sysPrompt" class="form-textarea" rows="3">${escapeHtml(getCurSysPrompt())}</textarea></div><div class="form-group"><label class="form-label">📚 导入语料 (txt/docx)</label><input type="file" id="docUpload" accept=".txt,.docx" style="display:none"><button class="btn btn-secondary btn-sm" id="importDocBtn">选择文件</button><div id="docsList">${docsHtml}</div></div></div></div>`;
        }
        function renderModeCard() {
            if(state.currentMode === 'longtext') {
                return `<div class="card" id="modeCard"><div class="card-header" id="modeHeader"><span class="card-title">📝 长文本生成</span><span class="collapse-btn">▶</span></div><div class="card-body"><div class="form-group"><textarea id="longtextPrompt" class="form-textarea tall" placeholder="输入你的提示词...">${escapeHtml(state.longtextUserPrompt)}</textarea></div><button class="btn btn-primary" id="genLongBtn">🚀 生成</button><div class="content-toolbar-external"><span id="longtextTokenInfo"></span><div><button class="btn btn-sm btn-secondary" id="clearLongBtn">🗑</button><button class="btn btn-sm btn-secondary" id="copyLongBtn">📋</button></div></div><div class="content-box" id="longtextContentBox"><div id="longtextDisplay"></div></div></div></div>`;
            } else if(state.currentMode === 'novel') {
                let chapsHtml = state.novelChapters.map((ch,i)=>`<div class="chapter-item" id="chapterItem${i}"><div class="chapter-header"><span class="chapter-number">第${i+1}章</span><div class="chapter-actions"><button class="btn btn-sm btn-primary gen-chap" data-idx="${i}">⚡生成</button><button class="btn btn-sm btn-secondary copy-chap" data-idx="${i}">📋</button><button class="btn btn-sm btn-secondary clear-chap" data-idx="${i}">🗑</button><button class="btn btn-sm btn-secondary regen-chap" data-idx="${i}">🔄重试</button><button class="btn btn-sm btn-danger del-chap" data-idx="${i}">✕</button></div></div><div class="form-group"><textarea class="form-textarea chap-summary" data-idx="${i}" rows="2" placeholder="章节梗概">${escapeHtml(ch.summary)}</textarea></div><div class="content-toolbar-external"><span id="chapterToken${i}" class="token-info">字数:${ch.content.length} Token:${estimateTokens(ch.content)}</span></div><div class="content-box" id="chapterBox${i}"><div id="chapterContent${i}">${ch.content ? formatText(ch.content) : '<span style="color:var(--text-muted)">未生成</span>'}</div></div></div>`).join('');
                return `<div class="card" id="modeCard"><div class="card-header" id="modeHeader"><span class="card-title">📖 小说创作</span><span class="collapse-btn">▶</span></div><div class="card-body"><div class="form-group"><label class="form-label">小说标题</label><input id="novelTitleInput" class="form-input" value="${escapeHtml(state.novelTitle)}"></div>${chapsHtml}<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;"><button class="btn btn-primary btn-sm" id="addChapBtn">➕ 新增章节</button><button class="btn btn-success btn-sm" id="concatAllBtn">📋 拼接复制</button><button class="btn btn-secondary btn-sm" id="genAllBtn">⚡ 全部生成</button><button class="btn btn-danger btn-sm" id="clearAllBtn">🗑 清除所有内容</button></div></div></div>`;
            } else {
                let rolesHtml = state.chatCharacters.map((c,i)=>`<div class="character-card ${state.chatSelectedIndices.includes(i)?'selected':''}" data-charidx="${i}"><input type="checkbox" class="character-checkbox" data-charidx="${i}" ${state.chatSelectedIndices.includes(i)?'checked':''}><span class="character-name">${escapeHtml(c.name)}</span><button class="btn btn-sm btn-secondary edit-char" data-charidx="${i}">✎</button><button class="btn btn-sm btn-danger del-char" data-charidx="${i}">✕</button></div>`).join('');
                return `<div class="card" id="modeCard"><div class="card-header" id="modeHeader"><span class="card-title">💬 对话模式</span><span class="collapse-btn">▶</span></div><div class="card-body"><div class="form-group"><label class="form-label">角色列表 (最多5个)</label><div id="rolesContainer">${rolesHtml}</div><button class="btn btn-primary btn-sm" id="newCharBtn">➕ 新增角色</button><button class="btn btn-secondary btn-sm" id="fullscreenChatBtn">📱 全屏聊天</button></div><div class="form-group"><label class="form-label">上下文轮数</label><input type="number" id="ctxCount" class="form-input" style="width:100px;" value="${state.chatContextCount}" min="1" max="20"></div><div class="content-toolbar-external"><span id="chatTokenInfo"></span><div><button class="btn btn-sm btn-secondary" id="clearChatBtn">🗑 清空对话</button><button class="btn btn-sm btn-secondary" id="copyChatBtn">📋 复制对话</button></div></div><div class="chat-area" id="chatHistoryArea"></div><div class="chat-input-row"><input type="text" id="chatInput" class="form-input" placeholder="输入消息..."><button class="btn btn-primary btn-sm" id="sendChatBtn">发送</button></div></div></div>`;
            }
        }
        function renderPreviewCard() {
            let content = state.currentMode === 'longtext' ? (state.longtextResult ? formatText(state.longtextResult) : '暂无') : state.novelChapters.map((ch,i)=>`<h3>第${i+1}章</h3><div>${formatText(ch.content||'（未生成）')}</div>`).join('');
            return `<div class="card" id="previewCard"><div class="card-header" id="previewHeader"><span class="card-title">📄 预览区</span><span class="collapse-btn">▶</span></div><div class="card-body"><div class="preview-section"><div class="preview-label">${state.currentMode==='novel'?state.novelTitle:'长文本'}</div><div id="previewContent">${content}</div></div></div></div>`;
        }

        function attachGlobalEvents() {
            document.getElementById('apiKeyInput')?.addEventListener('input', e=>{ state.apiKey=e.target.value; saveState(); });
            document.getElementById('modelSelect')?.addEventListener('change', e=>{ state.currentModel=e.target.value; saveState(); });
            document.getElementById('maxTokensInput')?.addEventListener('change', e=>{ state.maxTokens=Math.min(256000,Math.max(1000,parseInt(e.target.value)||256000)); saveState(); });
            document.getElementById('sysPrompt')?.addEventListener('input', e=>{ setCurSysPrompt(e.target.value); saveState(); });
            document.getElementById('importDocBtn')?.addEventListener('click',()=>document.getElementById('docUpload').click());
            document.getElementById('docUpload')?.addEventListener('change',async e=>{
                let file = e.target.files[0]; if(!file) return;
                let reader = new FileReader();
                reader.onload = ev => {
                    let content = ev.target.result;
                    if(content.length>500000) return alert('文档超过50万字');
                    state.importedDocs.push({ name: file.name, content });
                    saveState(); render();
                };
                if(file.name.endsWith('.txt')) reader.readAsText(file,'utf-8');
                else alert('暂仅支持txt，docx需额外库，简化版支持txt');
                e.target.value='';
            });
            document.querySelectorAll('.mode-tab').forEach(btn => btn.onclick = () => {
                if(btn.dataset.mode === state.currentMode) return;
                state.currentMode = btn.dataset.mode;
                state.chatFullscreen = false;
                saveState(); render();
            });
            document.getElementById('apiHeader')?.addEventListener('click',()=>{ state.collapsedCards.api=!state.collapsedCards.api; saveState(); applyCollapse(); });
            document.getElementById('modeHeader')?.addEventListener('click',()=>{ state.collapsedCards.mode=!state.collapsedCards.mode; saveState(); applyCollapse(); });
            document.getElementById('previewHeader')?.addEventListener('click',()=>{ state.collapsedCards.preview=!state.collapsedCards.preview; saveState(); applyCollapse(); });
        }
        function attachLongtextEvents() {
            document.getElementById('longtextPrompt')?.addEventListener('input', e=>{ state.longtextUserPrompt=e.target.value; saveState(); });
            document.getElementById('genLongBtn')?.addEventListener('click', generateLongtext);
            document.getElementById('clearLongBtn')?.addEventListener('click',()=>{ state.longtextResult=''; saveState(); render(); });
            document.getElementById('copyLongBtn')?.addEventListener('click',()=>copyText(state.longtextResult));
        }
        function attachNovelEvents() {
            document.getElementById('novelTitleInput')?.addEventListener('input', e=>{ state.novelTitle=e.target.value; saveState(); render(); });
            document.getElementById('addChapBtn')?.addEventListener('click', addChapter);
            document.getElementById('genAllBtn')?.addEventListener('click', generateAllChapters);
            document.getElementById('concatAllBtn')?.addEventListener('click', concatAndCopy);
            document.getElementById('clearAllBtn')?.addEventListener('click', clearAllChapters);
            document.querySelectorAll('.gen-chap').forEach(btn=>btn.onclick=()=>generateSingleChapter(parseInt(btn.dataset.idx),true));
            document.querySelectorAll('.copy-chap').forEach(btn=>btn.onclick=()=>copyChapter(parseInt(btn.dataset.idx)));
            document.querySelectorAll('.clear-chap').forEach(btn=>btn.onclick=()=>clearChapter(parseInt(btn.dataset.idx)));
            document.querySelectorAll('.regen-chap').forEach(btn=>btn.onclick=()=>generateSingleChapter(parseInt(btn.dataset.idx),true));
            document.querySelectorAll('.del-chap').forEach(btn=>btn.onclick=()=>deleteChapter(parseInt(btn.dataset.idx)));
            document.querySelectorAll('.chap-summary').forEach(ta=>ta.addEventListener('input',e=>{
                let idx = parseInt(e.target.dataset.idx);
                if(!isNaN(idx)) state.novelChapters[idx].summary = e.target.value; saveState();
            }));
        }
        function attachChatEvents() {
            renderChatHistoryUI();
            document.getElementById('ctxCount')?.addEventListener('change', e=>{ state.chatContextCount=parseInt(e.target.value)||6; saveState(); });
            document.getElementById('newCharBtn')?.addEventListener('click',()=>openCharEditor(-1));
            document.getElementById('fullscreenChatBtn')?.addEventListener('click',()=>{ if(state.chatSelectedIndices.length) { state.chatFullscreen=true; render(); } else alert('请至少选择一个角色'); });
            document.getElementById('clearChatBtn')?.addEventListener('click', clearChatHistory);
            document.getElementById('copyChatBtn')?.addEventListener('click', copyChatHistory);
            document.getElementById('sendChatBtn')?.addEventListener('click', async()=>{
                let input = document.getElementById('chatInput');
                let txt = input.value.trim(); if(!txt) return;
                input.value = '';
                await sendChatMessage(txt, false);
                render(); // 刷新界面
            });
            document.getElementById('chatInput')?.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('sendChatBtn')?.click(); });
            // 角色勾选
            document.querySelectorAll('.character-checkbox').forEach(cb=>cb.addEventListener('change', e=>{
                let idx = parseInt(e.target.dataset.charidx);
                if(e.target.checked) { if(!state.chatSelectedIndices.includes(idx)) state.chatSelectedIndices.push(idx); }
                else state.chatSelectedIndices = state.chatSelectedIndices.filter(i=>i!==idx);
                saveState(); render();
            }));
            document.querySelectorAll('.edit-char').forEach(btn=>btn.addEventListener('click', e=>{ e.stopPropagation(); openCharEditor(parseInt(btn.dataset.charidx)); }));
            document.querySelectorAll('.del-char').forEach(btn=>btn.addEventListener('click', e=>{ e.stopPropagation(); let idx=parseInt(btn.dataset.charidx); state.chatCharacters.splice(idx,1); state.chatSelectedIndices = state.chatSelectedIndices.filter(i=>i!==idx).map(i=>i>idx?i-1:i); saveState(); render(); }));
        }
        function applyCollapse() {
            document.getElementById('apiCard')?.classList.toggle('collapsed', state.collapsedCards.api);
            document.getElementById('modeCard')?.classList.toggle('collapsed', state.collapsedCards.mode);
            document.getElementById('previewCard')?.classList.toggle('collapsed', state.collapsedCards.preview);
        }
        function updatePreview() {
            let previewDiv = document.getElementById('previewContent');
            if(!previewDiv) return;
            if(state.currentMode === 'longtext') previewDiv.innerHTML = state.longtextResult ? formatText(state.longtextResult) : '暂无';
            else if(state.currentMode === 'novel') previewDiv.innerHTML = state.novelChapters.map((ch,i)=>`<h3>第${i+1}章</h3><div>${formatText(ch.content||'（未生成）')}</div>`).join('');
        }

        window.removeDoc = function(idx) { state.importedDocs.splice(idx,1); saveState(); render(); };
        // 方案保存/加载
        document.getElementById('saveProfileBtn')?.addEventListener('click',()=>{
            let name = prompt('方案名称');
            if(!name) return;
            let profiles = JSON.parse(localStorage.getItem(PROFILES_KEY)||'[]');
            let profile = { name, apiKey:state.apiKey, currentModel:state.currentModel, systemPromptLongtext:state.systemPromptLongtext, systemPromptNovel:state.systemPromptNovel, systemPromptChat:state.systemPromptChat, currentMode:state.currentMode };
            profiles.push(profile);
            if(profiles.length>10) profiles.shift();
            localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
            alert('已保存');
        });
        document.getElementById('loadProfileBtn')?.addEventListener('click',()=>{
            let profiles = JSON.parse(localStorage.getItem(PROFILES_KEY)||'[]');
            if(!profiles.length) return alert('无方案');
            let list = profiles.map((p,i)=>`<div style="margin-bottom:6px;"><strong>${escapeHtml(p.name)}</strong> <button class="btn btn-sm btn-primary" onclick="window.loadProfile(${i})">加载</button></div>`).join('');
            let modalDiv = document.createElement('div'); modalDiv.className='modal-overlay';
            modalDiv.innerHTML = `<div class="modal"><h3>选择方案</h3>${list}<button class="btn btn-secondary btn-sm" style="margin-top:8px;" onclick="this.closest('.modal-overlay').remove()">关闭</button></div>`;
            document.body.appendChild(modalDiv);
        });
        window.loadProfile = function(idx) {
            let profiles = JSON.parse(localStorage.getItem(PROFILES_KEY)||'[]');
            let p = profiles[idx];
            if(p) {
                state.apiKey = p.apiKey || '';
                state.currentModel = p.currentModel || 'deepseek-v4-pro';
                state.systemPromptLongtext = p.systemPromptLongtext || '';
                state.systemPromptNovel = p.systemPromptNovel || '';
                state.systemPromptChat = p.systemPromptChat || '';
                state.currentMode = p.currentMode || 'longtext';
                saveState(); render();
                document.querySelector('.modal-overlay')?.remove();
                alert('已加载');
            }
        };

        loadStoredState();
        render();
        setInterval(saveState, 5000);
    })();
</script>
</body>
</html>
